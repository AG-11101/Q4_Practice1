<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice1</title>
</head>
<body>
    <h1>JavaScript Conditional Statememt</h1>
    <input type="text" class="form-control" id="Age" placeholder="type here...">
    <button class="btn btn-info"onclick="AgeCheck()">Check</button>
    
    
    <script> 
        function AgeCheck(){
            var Age = document.getElementById("Age").value;

            if (isNaN(Age) || Age < 0){
            alert("Please input valid number")

            }
          else if (Age < 18){
            alert("You are a Minor")
          }
          else if (Age > 18){
            alert("Your leagal now");
          }
          else {
            alert ("Age can't be determined.");
          }
        }
    </script>
</body>
</html>
